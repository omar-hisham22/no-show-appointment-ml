<!DOCTYPE html>
<html>
<head>
    <title>No Show Prediction</title>
</head>

<body>
    <h2>Hospital Appointment Prediction</h2>

    <form action="/predict" method="post">

        Gender: <input type="text" name="gender"><br><br>
        Neighbourhood: <input type="text" name="neighbourhood"><br><br>
        Scholarship: <input type="text" name="scholarship"><br><br>
